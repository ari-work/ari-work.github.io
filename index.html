<style>
  :root{
    --bg:#f7eee1; --bg2:#f1e4d3;
    --surface:#fffdf8; --surface2:#faf0e2; --line:#ecdfce; --line2:#e2d2ba;
    --ink:#463829; --sub:#8b7660; --faint:#ab9880;
    --coral:#e67e4e; --coral-deep:#c65f2f; --coral-soft:#fbe6d6;
    --honey:#cf9c53; --honey-deep:#ab7d36; --honey-soft:#f7ead0;
    --sage:#77ab84; --amber:#cf992f;
    --shadow:0 12px 34px -10px rgba(90,55,25,.24); --shadow-sm:0 3px 14px -4px rgba(90,55,25,.18);
    --ring:0 0 0 1px rgba(90,55,25,.05);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#1b1610; --bg2:#141009;
    --surface:#251e15; --surface2:#2f251a; --line:#3c3023; --line2:#4b3b2a;
    --ink:#f2e8d8; --sub:#b9a88f; --faint:#8d7c66;
    --coral:#f0946a; --coral-deep:#e67e4e; --coral-soft:#33251a;
    --honey:#dcac63; --honey-deep:#cf9c53; --honey-soft:#332818;
    --sage:#8cc09a; --amber:#dcac57;
    --shadow:0 14px 40px -10px rgba(0,0,0,.6); --shadow-sm:0 4px 18px -6px rgba(0,0,0,.5);
    --ring:0 0 0 1px rgba(255,255,255,.03);
  }}
  :root[data-theme="light"]{--bg:#f7eee1;--bg2:#f1e4d3;--surface:#fffdf8;--surface2:#faf0e2;--line:#ecdfce;--line2:#e2d2ba;--ink:#463829;--sub:#8b7660;--faint:#ab9880;--coral:#e67e4e;--coral-deep:#c65f2f;--coral-soft:#fbe6d6;--honey:#cf9c53;--honey-deep:#ab7d36;--honey-soft:#f7ead0;--sage:#77ab84;--amber:#cf992f;--shadow:0 12px 34px -10px rgba(90,55,25,.24);--shadow-sm:0 3px 14px -4px rgba(90,55,25,.18);--ring:0 0 0 1px rgba(90,55,25,.05)}
  :root[data-theme="dark"]{--bg:#1b1610;--bg2:#141009;--surface:#251e15;--surface2:#2f251a;--line:#3c3023;--line2:#4b3b2a;--ink:#f2e8d8;--sub:#b9a88f;--faint:#8d7c66;--coral:#f0946a;--coral-deep:#e67e4e;--coral-soft:#33251a;--honey:#dcac63;--honey-deep:#cf9c53;--honey-soft:#332818;--sage:#8cc09a;--amber:#dcac57;--shadow:0 14px 40px -10px rgba(0,0,0,.6);--shadow-sm:0 4px 18px -6px rgba(0,0,0,.5);--ring:0 0 0 1px rgba(255,255,255,.03)}

  *{box-sizing:border-box}
  .wrap{margin:0;min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,sans-serif;
    background:radial-gradient(150% 80% at 50% -25%, var(--coral-soft), transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));
    padding:20px 13px 40px;display:flex;justify-content:center}
  .phone{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--line);
    border-radius:26px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .disp{font-family:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro","Hiragino Kaku Gothic ProN",system-ui,sans-serif}

  .hdr{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--honey-soft),var(--surface));position:sticky;top:0;z-index:5}
  .hdr .av{width:46px;height:46px}
  .hdr .who{display:flex;flex-direction:column;line-height:1.35}
  .hdr .who b{font-size:15px;font-weight:900}
  .hdr .who span{font-size:11.5px;color:var(--sub);font-weight:700;display:flex;align-items:center;gap:5px}
  .hdr .who span:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 2px color-mix(in srgb,var(--sage) 30%,transparent)}

  .av{flex:0 0 auto;border-radius:50%;background:radial-gradient(120% 120% at 30% 20%,#fff,var(--honey-soft));
    display:grid;place-items:center;box-shadow:var(--shadow-sm),var(--ring);border:2px solid var(--surface);overflow:hidden}
  :root[data-theme="dark"] .av{background:radial-gradient(120% 120% at 30% 20%,var(--surface2),var(--honey-soft));border-color:var(--line)}
  .av svg{width:80%;height:80%;display:block}
  .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

  .chat{padding:18px 15px 8px;display:flex;flex-direction:column;gap:11px;min-height:340px}
  .row{display:flex;gap:8px;align-items:flex-end;animation:pop .34s cubic-bezier(.2,.7,.25,1) both}
  .row.me{flex-direction:row-reverse}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.row{animation:none}}
  .row .av{width:34px;height:34px;margin-bottom:2px}
  .row .sp{width:34px;flex:0 0 auto}
  .bub{max-width:76%;padding:11px 15px;font-size:14px;line-height:1.8;font-weight:600;border-radius:18px;position:relative}
  .row.bot .bub{background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:6px}
  .row.me .bub{background:linear-gradient(180deg,var(--honey),var(--honey-deep));color:#fff;border-bottom-right-radius:6px;font-weight:700}
  .bub b{color:var(--coral-deep)} .row.me .bub b{color:#fff}
  :root[data-theme="dark"] .row.bot .bub b{color:var(--coral)}

  .typing{display:inline-flex;gap:4px;padding:15px 16px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--faint);animation:blink 1.2s infinite both}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  @media (prefers-reduced-motion:reduce){.typing i{animation:none}}

  .chips{display:flex;flex-direction:column;gap:8px;padding:6px 15px 18px;align-items:flex-end}
  .chip{appearance:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:14px;color:var(--coral-deep);
    background:var(--surface);border:1.5px solid var(--coral);border-radius:22px;padding:11px 18px;max-width:88%;text-align:right;
    transition:transform .06s,background .15s,box-shadow .15s;box-shadow:var(--shadow-sm)}
  :root[data-theme="dark"] .chip{color:var(--coral)}
  .chip:hover{background:var(--coral-soft)}
  .chip:active{transform:translateY(1px)}
  .chip:focus-visible{outline:3px solid var(--coral);outline-offset:2px}

  .rcard{max-width:90%;background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .gauge{padding:15px 16px}
  .gauge .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .gauge .lvl{font-size:19px;font-weight:900} .gauge .pct{font-size:12px;font-weight:800;color:var(--sub);font-variant-numeric:tabular-nums}
  .gauge .track{height:13px;border-radius:99px;background:var(--surface2);border:1px solid var(--line);overflow:hidden}
  .gauge .fill{height:100%;border-radius:99px;width:0;transition:width 1s cubic-bezier(.2,.7,.25,1)}
  @media (prefers-reduced-motion:reduce){.gauge .fill{transition:none}}
  .lvl-low{color:var(--sage)}.lvl-mid{color:var(--amber)}.lvl-high{color:var(--coral-deep)}
  :root[data-theme="dark"] .lvl-high{color:var(--coral)}
  .fill-low{background:linear-gradient(90deg,#8fc19c,var(--sage))}
  .fill-mid{background:linear-gradient(90deg,#e6bd5c,var(--amber))}
  .fill-high{background:linear-gradient(90deg,var(--coral),var(--coral-deep))}
  .tcard .head{display:flex;gap:12px;align-items:center;padding:14px 16px;background:linear-gradient(180deg,var(--honey-soft),transparent);border-bottom:1px solid var(--line)}
  .tcard .ic{flex:0 0 auto;width:42px;height:42px;border-radius:12px;background:var(--surface);display:grid;place-items:center;box-shadow:var(--shadow-sm),var(--ring)}
  .tcard .ic svg{width:23px;height:23px;stroke:var(--coral-deep);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="dark"] .tcard .ic svg{stroke:var(--coral)}
  .tcard .tt{font-size:10.5px;font-weight:800;color:var(--honey-deep);letter-spacing:.1em;text-transform:uppercase}
  :root[data-theme="dark"] .tcard .tt{color:var(--honey)}
  .tcard .tn{font-size:18px;font-weight:900;margin-top:2px}
  .tcard .body{padding:14px 16px;font-size:13.5px;line-height:2;font-weight:600}
  .tcard .body b{color:var(--coral-deep);font-weight:800}
  :root[data-theme="dark"] .tcard .body b{color:var(--coral)}

  .cta{padding:4px 15px 8px;display:flex;flex-direction:column;gap:9px}
  .adnote{display:flex;gap:8px;align-items:flex-start;font-size:11.5px;line-height:1.7;font-weight:700;color:var(--sub);padding:2px 2px 4px}
  .adnote b{color:var(--ink);font-weight:800}
  .adnote .pin{flex:0 0 auto;width:7px;height:7px;border-radius:50%;background:var(--coral);margin-top:5px}
  .btn{display:block;text-decoration:none;text-align:center;font-family:inherit;font-weight:800;padding:16px 16px;border-radius:15px;font-size:15px;line-height:1.45;transition:transform .06s,filter .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:linear-gradient(180deg,var(--coral),var(--coral-deep));color:#fff;box-shadow:0 5px 0 -1px var(--coral-deep),var(--shadow-sm)}
  .btn-primary small,.btn-line small{display:block;font-size:11px;font-weight:700;opacity:.94;margin-top:3px}
  .btn-line{background:linear-gradient(180deg,#22c760,#06a94a);color:#fff;box-shadow:0 5px 0 -1px #05913f,var(--shadow-sm)}
  .btn-line:hover{filter:brightness(1.03)}
  .btn-sec{background:var(--surface);color:var(--ink);border:1.5px solid var(--line2)}
  .btn-sec:hover{border-color:var(--coral)}
  .btn:focus-visible{outline:3px solid var(--coral);outline-offset:2px}
  .restart{background:none;border:0;color:var(--sub);font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:8px;align-self:center}
  .fine{font-size:10.5px;line-height:1.85;color:var(--faint);font-weight:600;padding:2px 16px}
  .foot{text-align:center;font-size:11px;color:var(--faint);font-weight:600;padding:12px 16px 16px}
  .foot b{color:var(--sub)}
</style>

    '<circle cx="24" cy="27" r="12" fill="#fff" stroke="var(--honey-deep)" stroke-width="1.8"/>'+
    '<circle cx="19.5" cy="26.5" r="1.7" fill="var(--ink)" stroke="none"/><circle cx="28.5" cy="26.5" r="1.7" fill="var(--ink)" stroke="none"/>'+
    '<circle cx="18" cy="30" r="1.6" fill="var(--coral-soft)" stroke="none"/><circle cx="30" cy="30" r="1.6" fill="var(--coral-soft)" stroke="none"/>'+
    '<path d="M20.5 31c1.3 1.5 5.7 1.5 7 0" stroke="var(--honey-deep)" stroke-width="1.7"/></g></svg>';}
  function face(exp){var s=PIX[exp||'peace'];return s?'<img src="'+s+'" alt="ゆってぃー">':mascot();}
  document.getElementById('hav').innerHTML=face('peace');

  var Q=[
    {q:"朝、仕事に行く前の気持ちって、いまどんな感じ？",o:[
      {t:"わりと平気かな",s:{b:0},r:"お、それはなにより😊 いいことだよ。"},
      {t:"ちょっと憂うつ…",s:{b:1},r:"うん、その“ちょっと”を見過ごさないの、大事だよ。"},
      {t:"毎回どんより重い",s:{b:2},r:"そっか…毎朝それは、地味にこたえるよね。よく通ってるよ、ほんと。"},
      {t:"考えるだけでしんどい",s:{b:3},r:"うっ、それはかなりのSOSかも…。ここまで話してくれてありがとうね。"}]},
    {q:"今の職場で、いちばんモヤっとするのはどれ？",o:[
      {t:"給料・待遇",s:{money:2},r:"なるほど、お金かぁ。生活に直結するもんね、大事なとこ。"},
      {t:"人間関係",s:{relations:2},r:"あー…人間関係ね。それ、いちばん心をすり減らすやつだ。"},
      {t:"残業・休日・忙しさ",s:{time:2},r:"時間かぁ。ちゃんと休めないの、ほんとにしんどいよね。"},
      {t:"将来・キャリアの不安",s:{future:2},r:"将来のこと考えてるの、それだけで前向きな証拠だよ。"}]},
    {q:"残業とか、休みの取りやすさはどう？",o:[
      {t:"ほとんど問題ない",s:{time:0},r:"それ、地味だけどすごく大事。ちゃんと休めてるの強みだよ。"},
      {t:"たまにキツい",s:{time:1},r:"うんうん、波がある感じね。無理しすぎないでね。"},
      {t:"多いし休みも取りにくい",s:{time:2,b:1},r:"それは心配だな…。体が資本なのに、頑張りすぎだよ。"}]},
    {q:"職場の人間関係、正直どうかな？",o:[
      {t:"おおむね良好",s:{relations:0},r:"いいね、それは何より恵まれてる環境だよ。"},
      {t:"可もなく不可もなく",s:{relations:1},r:"まあ、無難がいちばんってこともあるよね。"},
      {t:"気をつかって疲れる…",s:{relations:2,b:1},r:"わかる…気疲れって、目に見えないぶん本当にキツいんだよね。"}]},
    {q:"今のお給料には、納得できてる？",o:[
      {t:"まあ納得してる",s:{money:0},r:"納得できてるの、実はすごく大きいことだよ。"},
      {t:"少し不満かな",s:{money:1},r:"その“少し”、積もると効いてくるやつだ。侮れないよ。"},
      {t:"割に合わない気がする",s:{money:2},r:"がんばってるのにね…。その感覚、大事にしていいよ。"}]},
    {q:"5年後、今の職場で働いてる自分…想像できる？",o:[
      {t:"わりと想像できる",s:{future:0},r:"お、未来が描けてるのは強いよ。いい感じ。"},
      {t:"うーん、どちらとも",s:{future:1},r:"迷うよね。むしろ、それが自然だと思うよ。"},
      {t:"できない／したくない",s:{future:2,b:2},r:"…そっか。それを正直に言えたの、すごく大事な一歩だよ。"}]},
    {q:"最後に。「転職」って言葉、今の気持ちに近いのは？",o:[
      {t:"まだ考えてない",s:{r:0},r:"うん、それでいいの。知っておくだけでも十分だよ。"},
      {t:"情報だけは知りたい",s:{r:1},r:"かしこい。情報を持ってる人が、いちばん強いんだよ。"},
      {t:"わりと本気で考えてる",s:{r:2},r:"その気持ち、大切にしよ。ちゃんと応援するからね。"}]}
  ];
  var MAXB=9;
  var TYPES={
    money:{tn:"年収モヤモヤ型",exp:"arms",ic:'<svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M16 7.5c0-1.7-1.8-2.5-4-2.5S8 5.8 8 7.5 9.8 10 12 10s4 .8 4 2.5S14.2 15 12 15s-4-.8-4-2.5"/></svg>',
      body:"がんばりに給料が見合ってない——その感覚、けっこう当たってることが多いよ。<br>薬剤師の年収は「職場タイプ × 地域」の掛け算。同じ資格でも、選ぶ場所で差が出る。<br>まずは<b>“今の自分の相場”を知る</b>だけで、モヤモヤの正体が見えてくるよ。"},
    relations:{tn:"人間関係つかれ型",exp:"think",ic:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 6.5a3 3 0 0 1 0 5.6"/><path d="M18 14.5c2.2.6 3.5 2.3 3.5 4.5"/></svg>',
      body:"人間関係のしんどさは、<b>あなたが弱いからじゃなく“環境”の問題</b>なことが多いよ。<br>少人数で逃げ場がない、合わない人が近い——規模や場所が変わると、驚くほど楽になる人もいる。<br>今の環境が“普通”かどうかは、外を知らないと分からないものだよ。"},
    time:{tn:"働き方・時間型",exp:"arms",ic:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.2"/><path d="M12 7.5V12l3 2"/></svg>',
      body:"時間と休みのしんどさは、実は<b>“働き方”を変えると動かせる</b>部分だよ。<br>残業の少ない調剤、時間で区切れる派遣、在宅——薬剤師の働き方は想像より幅がある。<br>「ここしかない」って思い込むのが、いちばん消耗するんだ。"},
    future:{tn:"将来不安型",exp:"think",ic:'<svg viewBox="0 0 24 24"><path d="M4 20l5-6 3 3 4-6 4 5"/><path d="M4 20h16"/><circle cx="17" cy="6" r="1.6"/></svg>',
      body:"これからの薬剤師は「資格の有無」より<b>“何ができるか”</b>で差がつくと言われてる。<br>対人・在宅・デジタル対応——伸ばす方向を選べば、不安は“準備”に変えられる。<br>大事なのは、今いる場所が伸ばしたい方向と合ってるか、だよ。"}
  };

  var chat=document.getElementById('chat'), sc, idx, hist, lastBot=false;
  var TD=RM?0:560, GAP=RM?0:280;
  function scv(){var s=chat.lastElementChild;if(s)s.scrollIntoView({behavior:RM?'auto':'smooth',block:'end'});}
  function botRow(inner,exp){
    var row=document.createElement('div');row.className='row bot';
    row.innerHTML=(lastBot?'<div class="sp"></div>':'<div class="av">'+face(exp||'peace')+'</div>')+inner;
    chat.appendChild(row);lastBot=true;scv();return row;
  }
  function userRow(text){
    var row=document.createElement('div');row.className='row me';
    row.innerHTML='<div class="bub">'+text+'</div>';chat.appendChild(row);lastBot=false;scv();
  }
  function typingThen(cb){
    var row=botRow('<div class="bub typing"><i></i><i></i><i></i></div>');
    setTimeout(function(){row.remove();var l=chat.lastElementChild;lastBot=!!(l&&l.classList.contains('bot'));cb();},TD);
  }
  function botSay(html,exp,cb){typingThen(function(){botRow('<div class="bub">'+html+'</div>',exp);if(cb)setTimeout(cb,GAP);});}
  function chips(opts,onPick){
    var box=document.createElement('div');box.className='chips';
    opts.forEach(function(o,i){var b=document.createElement('button');b.className='chip';b.textContent=o.t;
      b.onclick=function(){box.remove();onPick(o,i);};box.appendChild(b);});
    chat.appendChild(box);scv();
  }

  function start(){
    chat.innerHTML='';sc={money:0,relations:0,time:0,future:0,b:0,r:0};idx=0;hist=[];lastBot=false;
    document.getElementById('foot').style.display='none';
    track('start');
    botSay("こんにちは、ゆってぃーです🌿",'peace',function(){
      botSay("「なんか、しんどい」の正体、7つの質問で一緒にほどいていこ。<br>いまの“おつかれ度”と、モヤモヤの中心がわかるよ。",'peace',function(){
        botSay("あ、これは医学的な診断じゃなくて、気持ちを整理するための目安ね。答えは保存しないから、安心して🌱",'peace',ask);
      });
    });
  }
  function ask(){
    if(idx>=Q.length)return finish();
    track('q'+(idx+1));
    botSay("<b>Q"+(idx+1)+" / 7</b>　"+Q[idx].q,idx>=5?'think':'peace',function(){
      chips(Q[idx].o,function(o){
        userRow(o.t);
        for(var k in o.s){sc[k]=(sc[k]||0)+o.s[k];}
        idx++;
        if(idx<Q.length){botSay(o.r,'peace',ask);}
        else{botSay(o.r,'peace',function(){botSay("ぜんぶ聞けたよ。ちょっとまとめるね…",'think',finish);});}
      });
    });
  }

  function finish(){
    track('complete');
    var pct=Math.round(sc.b/MAXB*100),lvl,cls,msg,exp;
    if(sc.b<=2){lvl="おつかれ度：軽め";cls="low";exp="thumb";msg="今のところ、大きく無理はしてない感じ。えらいよ。この調子で、小さなサインだけ早めに拾っていこ🌿";}
    else if(sc.b<=5){lvl="おつかれ度：中くらい";cls="mid";exp="arms";msg="じわじわ消耗してるサインが出てるかも。無理してない？一度“何がしんどいか”を分けてみる頃合いだね。";}
    else{lvl="おつかれ度：高め";cls="high";exp="think";msg="うん…かなり消耗してるサインが出てる。でもね、これは弱さじゃなくて、環境の負荷が大きいだけ。まず“逃げ道はある”って知るだけでも、ちょっと息できるよ。";}
    var axes=[["money",sc.money],["relations",sc.relations],["time",sc.time],["future",sc.future]];
    axes.sort(function(a,b){return b[1]-a[1];});
    var T=TYPES[axes[0][1]===0?"future":axes[0][0]];
    var lead;
    if(sc.r>=2){lead="動くなら“情報を集めてから”がいちばん失敗しにくいよ。まず無料で相場や実態を聞いてみるのがおすすめ。";}
    else if(sc.r===1){lead="まずは「情報だけ」がちょうどいい距離感。知っておくだけで、選択肢は増えるよ。";}
    else{lead="今すぐ動かなくて大丈夫。でも“今の立ち位置”を知っておくと、いざって時に迷わないよ。";}

    botSay("お待たせ！診断できたよ。まずは、いまの“おつかれ度”から🌡️",exp,function(){
      var r=botRow('<div class="rcard"><div class="gauge"><div class="top"><span class="lvl disp lvl-'+cls+'">'+lvl+'</span><span class="pct">'+pct+' / 100</span></div><div class="track"><div class="fill fill-'+cls+'" id="gf"></div></div></div></div>',exp);
      var f=r.querySelector('#gf');requestAnimationFrame(function(){requestAnimationFrame(function(){f.style.width=Math.max(6,pct)+'%';});});
      botSay(msg,exp,function(){
        botSay("それでね、あなたのモヤモヤの“中心”は、たぶんこれ。",T.exp,function(){
          botRow('<div class="rcard tcard"><div class="head"><div class="ic">'+T.ic+'</div><div><div class="tt disp">モヤモヤの中心</div><div class="tn disp">'+T.tn+'</div></div></div><div class="body">'+T.body+'</div></div>',T.exp);
          botSay("よかったら、次の一歩に使ってね。無理はしなくていいからね🌿",'thumb',showCTA);
        });
      });
    });
    function showCTA(){
      var box=document.createElement('div');box.className='cta';
      box.innerHTML=
        '<div class="adnote"><span class="pin"></span><span><b>広告を含みます。</b>'+lead+'</span></div>'+
        '<a class="btn btn-primary" href="'+A8+'" target="_blank" rel="noopener sponsored">無料で相談してみる（面談だけOK）<small>その場で登録しなくて大丈夫・「今日は話を聞くだけ」で帰る人がほとんど</small></a>'+
        '<a class="btn btn-line" href="'+LINE+'" target="_blank" rel="noopener">🌿 まだ動かない人へ｜LINEで“働き方のヒント”を受け取る<small>ゆってぃーから、年収・人間関係の話を数日おきに。いつでもブロックOK</small></a>'+
        '<a class="btn btn-sec" href="'+COMPARE+'" target="_blank" rel="noopener">サービスの選び方を先に読む（比較記事）</a>'+
        '<a class="btn btn-sec" href="'+PROFILE+'" target="_blank" rel="noopener">ほかの記事も読んでみる</a>';
      chat.appendChild(box);
      var a8=box.querySelector('a[rel~="sponsored"]');if(a8)a8.addEventListener('click',function(){track('cta-a8');});
      var ln=box.querySelector('a.btn-line');if(ln)ln.addEventListener('click',function(){track('cta-line');});
      var cp=box.querySelectorAll('a.btn-sec');if(cp[0])cp[0].addEventListener('click',function(){track('cta-compare');});
      var fine=document.createElement('p');fine.className='fine';
      fine.innerHTML='※これは医学的な診断ではなく、気持ちを整理するための目安です（結果は保存されません）。年収・働き方の傾向は各種調査をもとにした一般的な目安で、媒体・調査年により幅があります。効果・結果には個人差があり、転職を無理に勧めるものではありません。';
      chat.appendChild(fine);
      var rs=document.createElement('button');rs.className='restart';rs.textContent='もう一度診断する';rs.onclick=start;
      chat.appendChild(rs);
      document.getElementById('foot').style.display='';scv();
    }
  }
  start();
})();
</script>
